# DEPLOYMENT PHASES
# ═══════════════════════════════════════════════════════════════════════════════
#
# PHASE 1: Shadow (All 15 enabled)
#   - Full diagnostics
#   - Collect >= 1,000 trades per symbol
#   - Size ignored
#
# PHASE 2: Live Crypto (After expectancy proven)
#   - BTCUSDT @ $25
#   - ETHUSDT @ $20
#   - SOLUSDT @ $15
#   - Run 7-14 days
#
# PHASE 3: Add CFDs (After crypto profitable)
#   - XAUUSD first
#   - NAS100 second
#   - Never enable more than one CFD at a time
