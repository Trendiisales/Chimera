# ═══════════════════════════════════════════════════════════════════════════════
# CHIMERA v4.5.0 - Symbol Trading Profiles
# ═══════════════════════════════════════════════════════════════════════════════
#
# v4.5.0 ENGINE OWNERSHIP (NEW):
#   Engine ownership is now HARD-ENFORCED at execution boundary.
#   Each engine has its own allowed symbol list - see EngineOwnership.hpp
#   
#   - BINANCE ENGINE: All crypto (BTCUSDT, ETHUSDT, etc.)
#   - CFD ENGINE: All CFD EXCEPT NAS100 during income test
#   - INCOME ENGINE: NAS100 ONLY (hardcoded, cannot be changed)
#
#   ⚠️ WARNING: This config file is READ but does NOT override engine ownership.
#              Engine ownership is enforced in EngineOwnership.hpp
#
# EDGE QUALITY RANKING (v4.6.0):
#   TIER 1 (CORE): BTCUSDT, ETHUSDT, SOLUSDT - Primary money engines (crypto)
#   TIER 2 (ACTIVE CFD): 
#     - NAS100 (Income 03:00-05:00 NY, CFD outside)
#     - XAUUSD (defensive, post-sweep only)
#     - US30 (speed-optimised NY only)
#     - SPX500 (momentum-only NY only)
#   TIER 3 (SENSOR): XAGUSD, EURUSD, USDJPY - Limited capital
#   TIER 4 (DISABLED): GBPUSD, AUDUSD, USDCAD, USDCHF - No scaling
#
# RULE: 90% of profits come from 2-4 instruments. More symbols ≠ more edge.
# ═══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# GLOBAL SETTINGS
# ─────────────────────────────────────────────────────────────────────────────
[GLOBAL]
shadow_mode = true
paper_mode = true
live_mode = false

daily_loss_limit_usd = -500
max_drawdown_pct = 2.0
max_total_risk_pct = 0.5

min_shadow_trades = 100
capital_ramp_days = 7

# ═══════════════════════════════════════════════════════════════════════════════
# TIER 1: CRYPTO FAST-PATH PROFILES (v4.9.2)
# ═══════════════════════════════════════════════════════════════════════════════
# CRITICAL: Crypto does NOT use confidence/expectancy gates.
# Speed + exits replace confirmation. Frequency realizes expectancy.

[BTCUSDT]
asset_class = CRYPTO
tier = FAST_SCALP
fast_path = ON

enabled = true
live_enabled = true
session = ALL

# ─────────────────────────────────────────────────────────────────────────────
# ENTRY: Single-tick, NO confirmation, lowest threshold
# ─────────────────────────────────────────────────────────────────────────────
entry_edge_bps = 0.25
confirm = NONE
entry_confidence_min = 0.0
expectancy_gate = OFF
expectancy_min_bps = 0.0
expectancy_slope_min = 0.0

# ─────────────────────────────────────────────────────────────────────────────
# EXIT: Ultra-tight, time-scratch dominant
# ─────────────────────────────────────────────────────────────────────────────
tp_bps = 0.50
sl_bps = 0.30
max_hold_ms = 200
min_hold_ms = 0
exit_style = TIME_SCRATCH

# ─────────────────────────────────────────────────────────────────────────────
# EXECUTION: Speed > fees, TAKER ONLY
# ─────────────────────────────────────────────────────────────────────────────
routing = TAKER_ONLY
maker_timeout_ms = 0
mode = TAKER_ONLY
taker_slippage_cap_bps = 0.8

# ─────────────────────────────────────────────────────────────────────────────
# RISK: Small size, high frequency, contained daily loss
# ─────────────────────────────────────────────────────────────────────────────
base_size_usd = 87
size_scale = 0.50
max_position = 1
daily_loss_cap_pct = 0.40

latency_guard_us = 500

# ─────────────────────────────────────────────────────────────────────────────
[ETHUSDT]
asset_class = CRYPTO
tier = STRUCTURE_SCALP
fast_path = ON

enabled = true
live_enabled = true
session = ALL

# ─────────────────────────────────────────────────────────────────────────────
# ENTRY: OFI + Pressure confirmation (2 signals), NO conviction/expectancy
# ─────────────────────────────────────────────────────────────────────────────
entry_edge_bps = 0.45
confirm = OFI+PRESSURE
entry_confidence_min = 0.0
expectancy_gate = OFF
expectancy_min_bps = 0.0
expectancy_slope_min = 0.0

# ─────────────────────────────────────────────────────────────────────────────
# EXIT: Continuation style, wider TP (structure holds)
# ─────────────────────────────────────────────────────────────────────────────
tp_bps = 1.00
sl_bps = 0.40
max_hold_ms = 450
min_hold_ms = 0
exit_style = CONTINUATION

# ─────────────────────────────────────────────────────────────────────────────
# EXECUTION: Maker-first (fees matter), fallback to taker
# ─────────────────────────────────────────────────────────────────────────────
routing = MAKER_FIRST
maker_timeout_ms = 50
mode = HYBRID
taker_slippage_cap_bps = 1.0

# ─────────────────────────────────────────────────────────────────────────────
# RISK: Medium size, cleaner edge
# ─────────────────────────────────────────────────────────────────────────────
base_size_usd = 34
size_scale = 0.70
max_position = 1
daily_loss_cap_pct = 0.35

latency_guard_us = 500

# ─────────────────────────────────────────────────────────────────────────────
[SOLUSDT]
asset_class = CRYPTO
tier = VOLATILITY_SNIPER
fast_path = ON

enabled = true
live_enabled = true
session = ALL

# ─────────────────────────────────────────────────────────────────────────────
# ENTRY: REGIME-GATED (IMPULSE/CONTINUATION only), volatility required
# ─────────────────────────────────────────────────────────────────────────────
entry_edge_bps = 0.80
confirm = VOLATILITY+REGIME
entry_confidence_min = 0.0
expectancy_gate = OFF
expectancy_min_bps = 0.0
expectancy_slope_min = 0.0

# ─────────────────────────────────────────────────────────────────────────────
# EXIT: Spike-fade style, asymmetric (wider TP, medium SL)
# ─────────────────────────────────────────────────────────────────────────────
tp_bps = 1.60
sl_bps = 0.60
max_hold_ms = 300
min_hold_ms = 0
exit_style = SPIKE_FADE

# ─────────────────────────────────────────────────────────────────────────────
# EXECUTION: TAKER ONLY (avoid partials during spikes)
# ─────────────────────────────────────────────────────────────────────────────
routing = TAKER_ONLY
maker_timeout_ms = 0
mode = TAKER_ONLY
taker_slippage_cap_bps = 1.2

# ─────────────────────────────────────────────────────────────────────────────
# RISK: SMALLEST size (high beta), TIGHTEST daily cap
# ─────────────────────────────────────────────────────────────────────────────
base_size_usd = 20
size_scale = 0.40
max_position = 1
daily_loss_cap_pct = 0.25

# ─────────────────────────────────────────────────────────────────────────────
# SOL AUTO-DISABLE RULES:
#   - 3 consecutive losses → disable for session
#   - Daily PnL ≤ -0.20% → disable for session
#   - Regime ≠ IMPULSE/CONTINUATION for >10min → disable
# ─────────────────────────────────────────────────────────────────────────────
auto_disable_loss_streak = 3
auto_disable_pnl_pct = -0.20
auto_disable_idle_ms = 600000

latency_guard_us = 500

# ═══════════════════════════════════════════════════════════════════════════════
